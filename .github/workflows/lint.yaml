name: вң” Verification Checks

run-name: рҹ•өрҹҸ»вҖҚвҷӮпёҸ ${{ github.actor }} Running Verification Checks рҹ•өрҹҸ»вҖҚвҷӮпёҸ

on:
  push:
    branches:
    - '**'  

jobs: 
  Verify: 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=30m --new-from-rev=origin/main
    - name: Run Unit Tests
      run: go test ./... -run=.