name: вң” Lint Checks

run-name: рҹ•өрҹҸ»вҖҚвҷӮпёҸ ${{ github.actor }} Running Lint Checks рҹ•өрҹҸ»вҖҚвҷӮпёҸ

on:
  push:
    branches:
    - '**'  

jobs: 
  Lint: 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: "go.mod"
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=30m